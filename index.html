<div id="root"></div>
<script>
window.storage = {
  get: async function(k) {
    try { var v = localStorage.getItem(k); return v ? {value: v} : null; } catch(e) { return null; }
  },
  set: async function(k, v) {
    try { localStorage.setItem(k, v); return {key: k, value: v}; } catch(e) { return null; }
  },
  list: async function(prefix) {
    try {
      var p = prefix || '';
      var keys = Object.keys(localStorage).filter(function(k) { return k.startsWith(p); });
      return {keys: keys};
    } catch(e) { return {keys: []}; }
  }
};
</script>
<script type="text/babel">

function wall(r,c){if(r<0||r>=ROWS||c<0||c>=COLS)return true;return MAP[r][c]===1;}

function drawPahlsson(ctx,x,y,rad){
  const r=rad;ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='#f0c9a0';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8b888';ctx.fillRect(x-r*.28,y+r*.54,r*.56,r*.52);
  ctx.fillStyle='#2c2c2e';ctx.beginPath();ctx.moveTo(x-r*1.1,y+r*1.1);ctx.lineTo(x-r*.48,y+r*.58);ctx.lineTo(x-r*.18,y+r*.7);ctx.lineTo(x,y+r*.6);ctx.lineTo(x+r*.18,y+r*.7);ctx.lineTo(x+r*.48,y+r*.58);ctx.lineTo(x+r*1.1,y+r*1.1);ctx.fill();
  ctx.fillStyle='#a8c8e8';ctx.beginPath();ctx.moveTo(x-r*.18,y+r*.7);ctx.lineTo(x,y+r*.6);ctx.lineTo(x+r*.18,y+r*.7);ctx.lineTo(x+r*.13,y+r*1.1);ctx.lineTo(x-r*.13,y+r*1.1);ctx.fill();

  ctx.fillStyle='#d8eaf8';ctx.beginPath();ctx.moveTo(x,y+r*.62);ctx.lineTo(x-r*.25,y+r*.53);ctx.lineTo(x-r*.14,y+r*.73);ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y+r*.62);ctx.lineTo(x+r*.25,y+r*.53);ctx.lineTo(x+r*.14,y+r*.73);ctx.fill();
  ctx.fillStyle='#cc2200';ctx.beginPath();ctx.moveTo(x-r*.075,y+r*.7);ctx.lineTo(x+r*.075,y+r*.7);ctx.lineTo(x+r*.052,y+r*.93);ctx.lineTo(x,y+r*1.03);ctx.lineTo(x-r*.052,y+r*.93);ctx.fill();
  ctx.fillStyle='#aa1a00';ctx.beginPath();ctx.ellipse(x,y+r*.7,r*.075,r*.05,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='#f0c9a0';ctx.beginPath();ctx.ellipse(x-r*.5,y-r*.6,r*.2,r*.11,.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+r*.5,y-r*.6,r*.2,r*.11,-.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5a3818';ctx.lineWidth=r*.078;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-r*.44,y-r*.24);ctx.quadraticCurveTo(x-r*.27,y-r*.32,x-r*.11,y-r*.26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+r*.11,y-r*.26);ctx.quadraticCurveTo(x+r*.27,y-r*.32,x+r*.44,y-r*.24);ctx.stroke();

  ctx.strokeStyle='#b05030';ctx.lineWidth=r*.038;ctx.beginPath();ctx.moveTo(x-r*.25,y+r*.29);ctx.lineTo(x+r*.25,y+r*.29);ctx.stroke();
  ctx.fillStyle='rgba(210,90,70,.16)';ctx.beginPath();ctx.ellipse(x-r*.42,y+r*.2,r*.19,r*.11,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+r*.42,y+r*.2,r*.19,r*.11,0,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle='#4fc3f7';ctx.lineWidth=2.5;ctx.stroke();
}

function drawPavle(ctx,x,y,rad){
  const r=rad;ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='#e0b896';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#d4a880';ctx.fillRect(x-r*.24,y+r*.52,r*.48,r*.55);
  ctx.fillStyle='#222';ctx.beginPath();ctx.moveTo(x-r*1.1,y+r*1.1);ctx.lineTo(x-r*.46,y+r*.56);ctx.lineTo(x,y+r*.62);ctx.lineTo(x+r*.46,y+r*.56);ctx.lineTo(x+r*1.1,y+r*1.1);ctx.fill();
  ctx.fillStyle='#7a8070';
  ctx.beginPath();ctx.moveTo(x-r*1.1,y+r*1.1);ctx.lineTo(x-r*.46,y+r*.56);ctx.lineTo(x-r*.14,y+r*.68);ctx.lineTo(x-r*.06,y+r*1.1);ctx.lineTo(x-r*1.1,y+r*1.1);ctx.fill();
  ctx.beginPath();ctx.moveTo(x+r*1.1,y+r*1.1);ctx.lineTo(x+r*.46,y+r*.56);ctx.lineTo(x+r*.14,y+r*.68);ctx.lineTo(x+r*.06,y+r*1.1);ctx.lineTo(x+r*1.1,y+r*1.1);ctx.fill();
  ctx.strokeStyle='#bbb';ctx.lineWidth=r*.04;ctx.beginPath();ctx.moveTo(x,y+r*.62);ctx.lineTo(x,y+r*1.1);ctx.stroke();
  ctx.fillStyle='#ccc';ctx.fillRect(x-r*.04,y+r*.7,r*.08,r*.06);
  ctx.strokeStyle='rgba(100,105,90,.5)';ctx.lineWidth=r*.02;
  [[-.5,.75],[.5,.75],[-.55,.88],[.55,.88]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(x+dx*r,y+(dy-.04)*r);ctx.lineTo(x+(dx+.06)*r,y+dy*r);ctx.lineTo(x+dx*r,y+(dy+.04)*r);ctx.lineTo(x+(dx-.06)*r,y+dy*r);ctx.closePath();ctx.stroke();});
  ctx.strokeStyle='rgba(200,200,200,.7)';ctx.lineWidth=r*.018;ctx.beginPath();ctx.arc(x,y+r*.72,r*.18,.3,Math.PI-.3);ctx.stroke();
  ctx.fillStyle='#c8956a';ctx.beginPath();ctx.ellipse(x-r*.86,y+r*.04,r*.14,r*.2,.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+r*.86,y+r*.04,r*.14,r*.2,-.15,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2a1f14';
  [[0,-.56,.55],[-.4,-.48,.38],[.4,-.48,.38],[-.62,-.3,.3],[.62,-.3,.3],[-.22,-.72,.28],[.22,-.72,.28]].forEach(([dx,dy,sz])=>{ctx.beginPath();ctx.arc(x+dx*r,y+dy*r,sz*r,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#3d2c1a';ctx.beginPath();ctx.arc(x+r*.15,y-r*.6,r*.2,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='#3a2a1c';ctx.beginPath();ctx.ellipse(x,y+r*.32,r*.36,r*.16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#251a10';ctx.beginPath();ctx.ellipse(x,y+r*.18,r*.22,r*.08,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#201408';ctx.lineWidth=r*.085;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-r*.42,y-r*.22);ctx.quadraticCurveTo(x-r*.25,y-r*.3,x-r*.1,y-r*.23);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+r*.1,y-r*.23);ctx.quadraticCurveTo(x+r*.25,y-r*.3,x+r*.42,y-r*.22);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x-r*.25,y-r*.1,r*.13,r*.088,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+r*.25,y-r*.1,r*.13,r*.088,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2a1a08';ctx.beginPath();ctx.arc(x-r*.25,y-r*.1,r*.068,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+r*.25,y-r*.1,r*.068,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(x-r*.225,y-r*.122,r*.022,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+r*.275,y-r*.122,r*.022,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#6b4a28';ctx.lineWidth=r*.055;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(x-r*.26,y-r*.1,r*.175,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(x+r*.26,y-r*.1,r*.175,0,Math.PI*2);ctx.stroke();
  ctx.lineWidth=r*.04;ctx.beginPath();ctx.moveTo(x-r*.085,y-r*.1);ctx.lineTo(x+r*.085,y-r*.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-r*.435,y-r*.1);ctx.lineTo(x-r*.72,y-r*.06);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+r*.435,y-r*.1);ctx.lineTo(x+r*.72,y-r*.06);ctx.stroke();
  ctx.fillStyle='#c08060';ctx.beginPath();ctx.arc(x,y+r*.06,r*.07,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#7a3a20';ctx.lineWidth=r*.055;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-r*.16,y+r*.14);ctx.quadraticCurveTo(x+r*.05,y+r*.22,x+r*.2,y+r*.16);ctx.stroke();
  ctx.restore();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle='#a5d6a7';ctx.lineWidth=2.5;ctx.stroke();
}

function AvatarPreview({drawFn,size=80}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext('2d');ctx.clearRect(0,0,size,size);
    drawFn(ctx,size/2,size/2,size/2-3);
  },[drawFn,size]);
  return <canvas ref={ref} width={size} height={size} style={{borderRadius:'50%',display:'block'}}/>;
}

const CHARS=[
  {id:'pahlsson',name:'Påhlsson',title:'Inkassochef',ring:'#4fc3f7',draw:drawPahlsson},
  {id:'pavle',name:'Pavle',title:'Debt Collection Officer',ring:'#a5d6a7',draw:drawPavle}
];

function App(){
  const cvs=useRef(null),st=useRef(null),raf=useRef(null),tmr=useRef(null),last=useRef(0);
  const nd=useRef({dr:0,dc:0}),cd=useRef({dr:0,dc:0}),pops=useRef([]),typing=useRef(false),chr=useRef('pahlsson');
  const [phase,setPhase]=useState('start');
  const [selChar,setSelChar]=useState('pahlsson');
  const [score,setScore]=useState(0);
  const [caught,setCaught]=useState(0);
  const [tLeft,setTLeft]=useState(60);
  const [fScore,setFScore]=useState(0);
  const [fCaught,setFCaught]=useState(0);
  const [fBd,setFBd]=useState([0,0,0,0]);
  const [pName,setPName]=useState('');
  const [nInput,setNInput]=useState('');
  const [sb,setSb]=useState([]);
  const [sbLoad,setSbLoad]=useState(false);
  const [saved,setSaved]=useState(false);

  const loadSb=useCallback(async()=>{
    setSbLoad(true);
    try{
      const res=await window.storage.list('inkasso:score:');
      const entries=[];
      for(const key of (res?.keys||[])){
        try{const r2=await window.storage.get(key);if(r2)entries.push(JSON.parse(r2.value));}catch{}
      }
      entries.sort((a,b)=>b.score-a.score);
      setSb(entries.slice(0,10));
    }catch(e){console.error(e);}
    setSbLoad(false);
  },[]);

  useEffect(()=>{loadSb();},[]);

  const saveSc=useCallback(async(name,sc,bd,ct,char)=>{
    const key='inkasso:score:'+Date.now()+'-'+Math.random().toString(36).slice(2,7);
    const entry={name,score:sc,breakdown:bd,caught:ct,char,date:new Date().toLocaleDateString('sv-SE')};
    try{await window.storage.set(key,JSON.stringify(entry));}catch(e){console.error(e);}
    setSaved(true);loadSb();
  },[]);

  const initSt=useCallback(()=>{
    const dots=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(MAP[r][c]===0)dots.push({r,c,active:true});
    const cust=STARTS.map((s,i)=>({r:s.r,c:s.c,px:s.c*TILE+TILE/2,py:s.r*TILE+TILE/2,bs:BASE_SPEEDS[i],dr:0,dc:1,name:NAMES[i],stage:0}));
    st.current={p:{r:5,c:6,px:6*TILE+TILE/2,py:5*TILE+TILE/2,dr:0,dc:0},cust,dots,score:0,caught:0,tLeft:60,bd:[0,0,0,0]};
    nd.current={dr:0,dc:0};cd.current={dr:0,dc:0};pops.current=[];
  },[]);

  const endGame=useCallback(()=>{
    cancelAnimationFrame(raf.current);clearInterval(tmr.current);
    const s=st.current;
    setFScore(s.score);setFCaught(s.caught);setFBd([...s.bd]);
    setSaved(false);setNInput(pName||'');setPhase('end');
  },[pName]);

  const startGame=useCallback((cid)=>{
    chr.current=cid||chr.current;
    initSt();setScore(0);setCaught(0);setTLeft(60);setPhase('playing');
  },[initSt]);

  useEffect(()=>{
    const dn=e=>{
      if(typing.current)return;
      const m={'ArrowUp':[-1,0],'ArrowDown':[1,0],'ArrowLeft':[0,-1],'ArrowRight':[0,1],
        'w':[-1,0],'W':[-1,0],'s':[1,0],'S':[1,0],'a':[0,-1],'A':[0,-1],'d':[0,1],'D':[0,1]};
      if(m[e.key]){nd.current={dr:m[e.key][0],dc:m[e.key][1]};e.preventDefault();}
    };
    window.addEventListener('keydown',dn);return()=>window.removeEventListener('keydown',dn);
  },[]);

  useEffect(()=>{
    if(phase!=='playing')return;
    tmr.current=setInterval(()=>{
      if(!st.current)return;
      st.current.tLeft--;setTLeft(st.current.tLeft);
      if(st.current.tLeft<=0)endGame();
    },1000);
    return()=>clearInterval(tmr.current);
  },[phase,endGame]);

  useEffect(()=>{
    if(phase!=='playing')return;
    const canvas=cvs.current,ctx=canvas.getContext('2d');
    const char=CHARS.find(c=>c.id===chr.current)||CHARS[0];

    function moveCust(cu,dt){
      const spd=cu.bs*STAGES[cu.stage].speedMult;
      const tx=cu.c*TILE+TILE/2,ty=cu.r*TILE+TILE/2;
      const dx=tx-cu.px,dy=ty-cu.py,dist=Math.sqrt(dx*dx+dy*dy),step=spd*TILE*dt;
      if(dist>step){
        const nx=cu.px+(dx/dist)*step,ny=cu.py+(dy/dist)*step;
        if(!wall(Math.floor(ny/TILE),Math.floor(nx/TILE))){cu.px=nx;cu.py=ny;}
      } else {
        cu.px=tx;cu.py=ty;
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        const fwd=dirs.filter(([dr,dc])=>dr===cu.dr&&dc===cu.dc&&!wall(cu.r+dr,cu.c+dc));
        const trn=dirs.filter(([dr,dc])=>!(dr===cu.dr&&dc===cu.dc)&&!(dr===-cu.dr&&dc===-cu.dc)&&!wall(cu.r+dr,cu.c+dc));
        const rev=dirs.filter(([dr,dc])=>dr===-cu.dr&&dc===-cu.dc&&!wall(cu.r+dr,cu.c+dc));
        const rnd=Math.random();
        let pool=fwd.length&&rnd<.55?fwd:trn.length&&rnd<.95?trn:fwd.length?fwd:trn.length?trn:rev;
        if(pool&&pool.length){const d=pool[Math.floor(Math.random()*pool.length)];cu.dr=d[0];cu.dc=d[1];}
        const nr=cu.r+cu.dr,nc=cu.c+cu.dc;
        if(!wall(nr,nc)){cu.r=nr;cu.c=nc;cu.px=tx+cu.dc*step;cu.py=ty+cu.dr*step;}
      }
    }

    function respawn(cu){
      const p=st.current.p;
      const spots=STARTS.filter(s=>Math.abs(s.r-p.r)+Math.abs(s.c-p.c)>4);
      const s=spots[Math.floor(Math.random()*spots.length)]||STARTS[3];
      cu.r=s.r;cu.c=s.c;cu.px=s.c*TILE+TILE/2;cu.py=s.r*TILE+TILE/2;
    }

    function drawCust(cu){
      const sg=STAGES[cu.stage],{px:x,py:y}=cu;
      ctx.save();ctx.translate(x,y);
      if(cu.stage>=2){ctx.beginPath();ctx.arc(0,0,TILE*.42,0,Math.PI*2);ctx.strokeStyle=cu.stage===3?'#ce93d8':'#ef9a9a';ctx.lineWidth=2.5;ctx.stroke();}
      ctx.beginPath();ctx.arc(0,0,TILE*.34,0,Math.PI*2);ctx.fillStyle=sg.color;ctx.fill();
      const es=cu.stage*1.5;
      ctx.fillStyle='rgba(0,0,0,.6)';
      ctx.beginPath();ctx.arc(-4+es*.3,-3-es*.2,2+es*.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(4-es*.3,-3-es*.2,2+es*.2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=1.5;
      if(cu.stage<=1){ctx.beginPath();ctx.arc(0,5,4,.2,Math.PI-.2);ctx.stroke();}
      else{ctx.beginPath();ctx.arc(0,8,5,Math.PI+.3,Math.PI*2-.3);ctx.stroke();}
      ctx.fillStyle=sg.color;ctx.fillRect(-14,7,28,10);
      ctx.fillStyle=sg.textColor;ctx.font=`bold ${cu.stage===2?5.5:6}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sg.emoji+' '+sg.name,-.5,12);
      for(let i=0;i<=cu.stage;i++){
        ctx.fillStyle=cu.stage===3?'#ce93d8':cu.stage===2?'#ef5350':cu.stage===1?'#ffb74d':'#81c784';
        ctx.fillRect(-14+i*7,19,5,3);
      }
      ctx.restore();
      ctx.fillStyle='#bbb';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(cu.name,x,y+TILE*.44);
    }

    let mDir=1,mA=0;
    function loop(ts=0){
      const dt=Math.min((ts-last.current)/1000,.05);last.current=ts;
      const s=st.current;if(!s)return;
      const{p,cust,dots}=s;
      const ndir=nd.current,cdir=cd.current;
      if(ndir.dr!==cdir.dr||ndir.dc!==cdir.dc){
        const cx=p.c*TILE+TILE/2,cy=p.r*TILE+TILE/2;
        if(Math.sqrt((p.px-cx)**2+(p.py-cy)**2)<6&&!wall(p.r+ndir.dr,p.c+ndir.dc)){
          p.dr=ndir.dr;p.dc=ndir.dc;cd.current={...ndir};
        }
      }
      if(!wall(p.r+p.dr,p.c+p.dc)){p.px+=p.dc*3.8*TILE*dt;p.py+=p.dr*3.8*TILE*dt;}
      else{p.px=p.c*TILE+TILE/2;p.py=p.r*TILE+TILE/2;p.dr=0;p.dc=0;cd.current={dr:0,dc:0};}
      const cr=Math.round((p.py-TILE/2)/TILE),cc=Math.round((p.px-TILE/2)/TILE);
      if(!wall(cr,cc)){p.r=cr;p.c=cc;}
      mA+=mDir*180*dt;if(mA>30)mDir=-1;if(mA<2)mDir=1;
      dots.forEach(d=>{if(d.active&&d.r===p.r&&d.c===p.c){d.active=false;s.score+=5;setScore(s.score);}});
      cust.forEach(cu=>{
        moveCust(cu,dt);
        const dx=cu.px-p.px,dy=cu.py-p.py;
        if(Math.sqrt(dx*dx+dy*dy)<TILE*.6){
          const sg=STAGES[cu.stage];
          s.score+=sg.points;s.caught++;s.bd[cu.stage]++;
          setScore(s.score);setCaught(s.caught);
          pops.current.push({x:cu.px,y:cu.py,text:'+'+sg.points+' '+sg.emoji,color:sg.color,life:1.2});
          cu.stage=Math.min(cu.stage+1,3);respawn(cu);
        }
      });
      pops.current=pops.current.filter(p=>p.life>0);
      pops.current.forEach(p=>{p.life-=dt;p.y-=35*dt;});
      ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++){
        if(MAP[row][col]===1){
          ctx.fillStyle='#2a2a5a';ctx.fillRect(col*TILE,row*TILE,TILE,TILE);
          ctx.strokeStyle='#3a3a8a';ctx.lineWidth=.5;ctx.strokeRect(col*TILE+.5,row*TILE+.5,TILE-1,TILE-1);
        }
      }
      dots.forEach(d=>{
        if(!d.active)return;
        ctx.fillStyle='#ffd700';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('kr',d.c*TILE+TILE/2,d.r*TILE+TILE/2);
      });
      cust.forEach(cu=>drawCust(cu));
      char.draw(ctx,p.px,p.py,TILE*.44);
      ctx.fillStyle=char.ring;ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(char.name,p.px,p.py+TILE*.47);
      pops.current.forEach(pp=>{
        ctx.globalAlpha=Math.max(0,pp.life);ctx.fillStyle=pp.color;ctx.font='bold 13px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pp.text,pp.x,pp.y);ctx.globalAlpha=1;
      });
      raf.current=requestAnimationFrame(loop);
    }
    last.current=0;raf.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(raf.current);
  },[phase]);

  const dpad=(dr,dc)=>{nd.current={dr,dc};};
  const doSave=()=>{const n=nInput.trim()||'Anonym';setPName(n);saveSc(n,fScore,fBd,fCaught,chr.current);};
  const btn={padding:'8px 20px',border:'1px solid rgba(255,255,255,.4)',background:'transparent',color:'#fff',borderRadius:8,fontSize:14,cursor:'pointer'};

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'1rem 0',fontFamily:'sans-serif'}}>
      <div style={{display:'flex',gap:'1.5rem',marginBottom:'.5rem',fontSize:14,color:'#f0f0f0',fontWeight:500}}>
        <div>Poäng: <span style={{fontWeight:400,color:'#aaa'}}>{score}</span></div>
        <div>Infångade: <span style={{fontWeight:400,color:'#aaa'}}>{caught}</span></div>
        <div>Tid: <span style={{fontWeight:400,color:'#aaa'}}>{tLeft}</span>s</div>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap',justifyContent:'center'}}>
        {STAGES.map((s,i)=><div key={i} style={{background:s.color,color:s.textColor,fontSize:10,fontWeight:500,padding:'2px 7px',borderRadius:6}}>{s.emoji} {s.name} +{s.points}p</div>)}
      </div>
      <div style={{position:'relative'}}>
        <canvas ref={cvs} width={COLS*TILE} height={ROWS*TILE} style={{border:'1px solid #555',borderRadius:8,background:'#1a1a2e',display:'block'}}/>
        {phase==='start'&&<OL>
          <div style={{fontSize:22,fontWeight:500}}>💼 INKASSO-MAN</div>
          <div style={{fontSize:13,opacity:.8}}>Indrivning med Påhlsson</div>
          <div style={{fontSize:11,opacity:.65,lineHeight:1.9}}>{STAGES.map((s,i)=><div key={i}>{s.emoji} {s.name} = {s.points}p | x{s.speedMult}x hastighet</div>)}</div>
          <button style={btn} onClick={()=>setPhase('pick')}>Välj spelare ▶</button>
          <div style={{fontSize:12,opacity:.6,cursor:'pointer',textDecoration:'underline'}} onClick={()=>setPhase('scores')}>Se scoreboard 🏆</div>
        </OL>}
        {phase==='pick'&&<OL>
          <div style={{fontSize:18,fontWeight:500}}>Välj din spelare</div>
          <div style={{display:'flex',gap:16,marginTop:4}}>
            {CHARS.map(ch=><div key={ch.id} onClick={()=>setSelChar(ch.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:'12px 16px',border:`2px solid ${selChar===ch.id?ch.ring:'rgba(255,255,255,.2)'}`,borderRadius:12,cursor:'pointer',background:selChar===ch.id?'rgba(255,255,255,.1)':'transparent'}}>
              <AvatarPreview drawFn={ch.draw} size={80}/>
              <div style={{fontSize:14,fontWeight:500}}>{ch.name}</div>
              <div style={{fontSize:11,opacity:.65}}>{ch.title}</div>
            </div>)}
          </div>
          <button style={{...btn,marginTop:8}} onClick={()=>startGame(selChar)}>Starta spelet 🎮</button>
          <div style={{fontSize:12,opacity:.5,cursor:'pointer'}} onClick={()=>setPhase('start')}>← Tillbaka</div>
        </OL>}
        {phase==='end'&&<OL>
          <div style={{fontSize:20,fontWeight:500}}>Tid ute!</div>
          <div style={{fontSize:22,fontWeight:500,color:'#ffd700'}}>Poäng: {fScore}</div>
          <div style={{fontSize:12,lineHeight:1.9,opacity:.85}}>{STAGES.map((s,i)=><div key={i}>{s.emoji} {s.name}: <b>{fBd[i]}</b> st (+{fBd[i]*s.points}p)</div>)}</div>
          {!saved
            ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,marginTop:4}}>
              <div style={{fontSize:12,opacity:.75}}>Ange ditt namn för scoreboard:</div>
              <input value={nInput} onChange={e=>setNInput(e.target.value)}
                onFocus={()=>{typing.current=true;}} onBlur={()=>{typing.current=false;}}
                onKeyDown={e=>{e.stopPropagation();if(e.key==='Enter')doSave();}}
                placeholder="Ditt namn..." maxLength={20} autoFocus
                style={{padding:'6px 12px',borderRadius:8,border:'1px solid rgba(255,255,255,.3)',background:'rgba(255,255,255,.1)',color:'#fff',fontSize:14,textAlign:'center',width:160,outline:'none'}}/>
              <div style={{display:'flex',gap:8}}>
                <button style={btn} onClick={doSave}>Spara 🏆</button>
                <button style={{...btn,opacity:.6}} onClick={()=>setPhase('pick')}>Skippa</button>
              </div>
            </div>
            :<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
              <div style={{fontSize:13,color:'#81c784'}}>✅ Sparat!</div>
              <div style={{display:'flex',gap:8}}>
                <button style={btn} onClick={()=>setPhase('pick')}>Spela igen</button>
                <button style={{...btn,opacity:.8}} onClick={()=>setPhase('scores')}>Se scoreboard 🏆</button>
              </div>
            </div>
          }
        </OL>}
        {phase==='scores'&&<OL>
          <div style={{fontSize:20,fontWeight:500}}>🏆 Scoreboard</div>
          {sbLoad?<div style={{opacity:.6,fontSize:13}}>Laddar...</div>
            :<div style={{width:'100%',maxWidth:360,maxHeight:260,overflowY:'auto'}}>
              {sb.length===0&&<div style={{opacity:.6,fontSize:13}}>Inga resultat än!</div>}
              {sb.map((e,i)=>{
                const ch=CHARS.find(c=>c.id===e.char);
                return<div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',borderRadius:8,background:i===0?'rgba(255,215,0,.15)':i<3?'rgba(255,255,255,.07)':'transparent',marginBottom:3}}>
                  <span style={{fontSize:16,minWidth:24}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`}</span>
                  {ch&&<AvatarPreview drawFn={ch.draw} size={28}/>}
                  <span style={{flex:1,fontSize:13,fontWeight:500}}>{e.name}</span>
                  <span style={{fontSize:14,fontWeight:500,color:'#ffd700'}}>{e.score}p</span>
                  <span style={{fontSize:10,opacity:.5}}>{e.date}</span>
                </div>;
              })}
            </div>
          }
          <div style={{display:'flex',gap:8,marginTop:4}}>
            <button style={btn} onClick={()=>setPhase('pick')}>Spela 🎮</button>
            <button style={{...btn,opacity:.6,fontSize:13}} onClick={loadSb}>Uppdatera</button>
          </div>
        </OL>}
      </div>
      <div style={{marginTop:10,display:'grid',gridTemplateColumns:'40px 40px 40px',gridTemplateRows:'40px 40px',gap:4}}>
        <div/><Dp label="▲" fn={()=>dpad(-1,0)}/><div/>
        <Dp label="◄" fn={()=>dpad(0,-1)}/>
        <Dp label="▼" fn={()=>dpad(1,0)}/>
        <Dp label="►" fn={()=>dpad(0,1)}/>
      </div>
    </div>
  );
}

function OL({children}){
  return<div style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'rgba(10,10,20,.9)',borderRadius:8,color:'#fff',textAlign:'center',gap:10,padding:'1rem'}}>{children}</div>;
}
function Dp({label,fn}){
  return<button onMouseDown={fn} onTouchStart={e=>{e.preventDefault();fn();}} style={{background:'#2a2a2a',border:'1px solid #444',borderRadius:8,fontSize:16,cursor:'pointer',color:'#f0f0f0',display:'flex',alignItems:'center',justifyContent:'center'}}>{label}</button>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
