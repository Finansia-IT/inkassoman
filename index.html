<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inkasso-Man</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; }
    :root {
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #aaa;
      --color-background-secondary: #2a2a2a;
      --color-border-secondary: #444;
      --color-border-primary: #555;
      --font-sans: sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.storage = {
      get: function(k,s){ try{ var v=localStorage.getItem((s?'sh:':'')+k); return v?{value:v}:null; }catch(e){return null;} },
      set: function(k,v,s){ try{ localStorage.setItem((s?'sh:':'')+k,v); return{key:k,value:v}; }catch(e){return null;} },
      list: function(prefix,s){ try{ var p=(s?'sh:':'')+(prefix||''); var keys=Object.keys(localStorage).filter(function(k){return k.startsWith(p);}); return{keys:keys}; }catch(e){return{keys:[]};} }
    };
  </script>

  <!-- Ladda app.jsx utan data-type="module" så exports-variabeln inte krockar -->
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    var domNode = document.getElementById('root');
    var root = ReactDOM.createRoot(domNode);
    root.render(React.createElement(App));
  </script>
</body>
</html>
